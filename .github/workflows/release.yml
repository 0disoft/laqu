name: Release

"on":
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release tag
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == '0disoft/laqu'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check tag and package metadata
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const expectedTag = `v${pkg.version}`;
          const actualTag = process.env.GITHUB_REF_NAME;

          if (actualTag !== expectedTag) {
            console.error(`Tag ${actualTag} does not match package version ${expectedTag}.`);
            process.exit(1);
          }

          if (pkg.name !== "@0disoft/laqu") {
            console.error(`Unexpected package name: ${pkg.name}`);
            process.exit(1);
          }

          if (pkg.publishConfig?.access !== "public") {
            console.error("package.json must set publishConfig.access to public.");
            process.exit(1);
          }
          NODE

      - name: Check package
        run: bun run check

      - name: Check packed package
        run: bun run pack:check

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == '0disoft/laqu'
    needs: verify
    environment:
      name: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check tag and package metadata
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const expectedTag = `v${pkg.version}`;
          const actualTag = process.env.GITHUB_REF_NAME;

          if (actualTag !== expectedTag) {
            console.error(`Tag ${actualTag} does not match package version ${expectedTag}.`);
            process.exit(1);
          }

          if (pkg.name !== "@0disoft/laqu") {
            console.error(`Unexpected package name: ${pkg.name}`);
            process.exit(1);
          }

          if (pkg.publishConfig?.access !== "public") {
            console.error("package.json must set publishConfig.access to public.");
            process.exit(1);
          }
          NODE

      - name: Check package
        run: bun run check

      - name: Pack package
        id: pack
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from "node:child_process";
          import { appendFileSync } from "node:fs";

          const output = execFileSync("npm", ["pack", "--json"], { encoding: "utf8" });
          const packed = JSON.parse(output);
          const fileName = packed?.[0]?.filename;

          if (!Array.isArray(packed) || packed.length !== 1 || typeof fileName !== "string") {
            console.error("Expected npm pack --json to return exactly one package filename.");
            process.exit(1);
          }

          if (!/^[A-Za-z0-9._-]+\.tgz$/.test(fileName)) {
            console.error(`Unexpected package tarball filename: ${fileName}`);
            process.exit(1);
          }

          appendFileSync(process.env.GITHUB_OUTPUT, `filename=${fileName}\n`);
          NODE

      - name: Upload release package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package-${{ github.ref_name }}
          path: ${{ steps.pack.outputs.filename }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish to npm
        env:
          PACKAGE_FILE: ${{ steps.pack.outputs.filename }}
        run: npm publish "$PACKAGE_FILE" --provenance --access public

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.repository == '0disoft/laqu'
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
